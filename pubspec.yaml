name: negocios_locales
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cloud_firestore: ^6.5.0
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^3.3.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_generative_ai: ^0.4.7
  google_maps_flutter: ^2.17.1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/deredo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/deredo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
